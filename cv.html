<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emanuel Camacho | CV</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script src="https://kit.fontawesome.com/0d6b8e9f09.js" crossorigin="anonymous"></script>
</head>
<body>

<nav>
    <div><strong>EMANUEL CAMACHO</strong></div>
    <div>
        <a href="index.html">Home</a>
        <a href="#cv">CV</a>
        <a href="index.html#contact">Contact</a>
    </div>
</nav>

<section id="cv" class="section">
    <h2>Curriculum Vitae</h2>
    <div class="card">
        <p>
            You can view my full professional CV below.
        </p>
        <iframe src="files/CV.pdf"></iframe>
        <a href="index.html" class="btn"><i class="fas fa-arrow-left"></i> Back to Portfolio</a>
    </div>
</section>



<script>
const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
        if(entry.isIntersecting){ entry.target.classList.add("visible"); }
    });
});
document.querySelectorAll(".section, .card").forEach(el => {
    el.classList.add("fade-in"); observer.observe(el);
});
</script>

</body>
</html>
